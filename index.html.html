        function generateCollectionFolders() {
            var categoryMap = {};
            collectionData.forEach(function(item) {
                var category = item.category;
                if (!categoryMap[category]) {
                    categoryMap[category] = { title: category, count: 0, images: [] };
                }
                categoryMap[category].count++;
                if (categoryMap[category].images.length < 4) {
                    categoryMap[category].images.push(item.image);
                }
            });
            var folders = [];
            for (var key in categoryMap) {
                if (categoryMap.hasOwnProperty(key)) {
                    folders.push(categoryMap[key]);
                }
            }
            return folders.sort(function(a, b) { return b.count - a.count; });
        }
        
        var collectionFolders = generateCollectionFolders();
        var currentFilter = 'all';
        var isClassifying = false;
        var batchMode = null;
        var selectedItems = [];
        var selectedFolders = [];
        var permissionType = null;

        var elements = {};

        function initApp() {
            window.addEventListener('error', function(event) {
                console.error('全局错误:', event.error);
                var msg = (event.error && event.error.message) ? event.error.message : '未知错误';
                showStatusMessage('页面发生错误: ' + msg, 'error');
            });

            window.addEventListener('unhandledrejection', function(event) {
                console.error('未处理的Promise拒绝:', event.reason);
                var msg = (event.reason && event.reason.message) ? event.reason.message : event.reason;
                showStatusMessage('异步操作失败: ' + msg, 'error');
            });
            
            try {
                elements = {
                    feedContainer: document.getElementById('feedContainer'),
                    collectionList: document.getElementById('collectionList'),
                    mainTabs: document.getElementById('mainTabs'),
                    secondaryTabs: document.getElementById('secondaryTabs'),
                    aiSortBtn: document.getElementById('aiSortBtn'),
                    aiBtnText: document.getElementById('aiBtnText'),
                    aiSpinner: document.getElementById('aiSpinner'),
                    statusMessage: document.getElementById('statusMessage'),
                    collectionStats: document.getElementById('collectionStats'),
                    countAll: document.getElementById('countAll'),
                    countFavorites: document.getElementById('countFavorites'),
                    batchManageBtn: document.getElementById('batchManageBtn'),
                    batchModal: document.getElementById('batchModal'),
                    modalOverlay: document.getElementById('modalOverlay'),
                    modalClose: document.getElementById('modalClose'),
                    mainMenu: document.getElementById('mainMenu'),
                    permissionMenu: document.getElementById('permissionMenu'),
                    optionPermission: document.getElementById('optionPermission'),
                    optionMove: document.getElementById('optionMove'),
                    optionDeleteFolder: document.getElementById('optionDeleteFolder'),
                    optionDelete: document.getElementById('optionDelete'),
                    backToMain: document.getElementById('backToMain'),
                    batchActionBar: document.getElementById('batchActionBar'),
                    batchConfirmBtn: document.getElementById('batchConfirmBtn'),
                    batchCancelBtn: document.getElementById('batchCancelBtn'),
                    customCategoryBtn: document.getElementById('customCategoryBtn'),
                    selectionCounter: document.getElementById('selectionCounter'),
                    folderDetailView: document.getElementById('folderDetailView'),
                    backToFolderBtn: document.getElementById('backToFolderBtn'),
                    detailGrid: document.getElementById('detailGrid'),
                    emptyState: document.getElementById('emptyState'),
                    emptyStateMessage: document.getElementById('emptyStateMessage')
                };

                updateStats();
                attachTabListeners();
                attachAIClassificationListener();
                attachBatchModalListeners();
                attachCardClickListeners();
                attachBatchActionListeners();
                attachCustomCategoryListener();
                switchView('all');
                elements.backToFolderBtn.addEventListener('click', closeFolderDetail);
            } catch (error) {
                console.error('初始化应用失败:', error);
                showStatusMessage('应用初始化失败: ' + error.message, 'error');
            }
        }

        function updateStats() {
            var total = collectionData.length;
            var favoritesCount = collectionFolders.length;
            elements.countAll.textContent = total;
            elements.countFavorites.textContent = favoritesCount;
            elements.collectionStats.textContent = '共 ' + total + ' 条笔记 · ' + favoritesCount + ' 个收藏夹';
        }

        function renderFeed(filter) {
            filter = filter || 'all';
            elements.feedContainer.innerHTML = '';
            var filteredData = [];
            
            if(filter === 'all') { filteredData = collectionData; }
            else if(filter === 'ai') { filteredData = collectionData.filter(function(item) { return item.classified && !item.custom; }); }
            else if(filter === 'custom') { filteredData = collectionData.filter(function(item) { return item.custom; }); }
            else if(filter === 'pending') { filteredData = collectionData.filter(function(item) { return !item.classified; }); }
            else { filteredData = collectionData; }

            elements.emptyState.style.display = 'none';
            elements.feedContainer.style.display = 'grid';
            
            if (filteredData.length === 0) {
                elements.feedContainer.style.display = 'none';
                if (elements.emptyState.parentElement !== elements.feedContainer.parentElement) {
                    elements.feedContainer.parentElement.insertBefore(elements.emptyState, elements.feedContainer);
                }
                elements.emptyState.style.display = 'block';
                elements.emptyStateMessage.textContent = filter === 'pending' ? '🎉 太棒了！所有内容都已分类完毕！' : '暂无' + getFilterName(filter) + '内容';
                return;
            }

            filteredData.forEach(function(item) {
                var badgeHtml = '';
                var category = item.category;
                if (category.indexOf('自定义：') === 0) {
                    badgeHtml = '<div class="ai-badge" style="background: rgba(59, 130, 246, 0.8);">🏷️ ' + category + '</div>';
                } else if (category === '待分类') {
                    badgeHtml = '<div class="ai-badge" style="background: rgba(245, 158, 11, 0.8);">⏳ ' + category + '</div>';
                } else if (category.indexOf('AI分类：') === 0) {
                    badgeHtml = '<div class="ai-badge">✨ ' + category + '</div>';
                } else {
                    badgeHtml = '<div class="ai-badge">' + category + '</div>';
                }

                var cardHtml = 
                    '<div class="card" data-id="' + item.id + '" data-type="item">' +
                        '<div class="select-checkbox"></div>' +
                        badgeHtml +
                        '<img src="' + item.image + '" alt="封面" class="card-cover" loading="lazy">' +
                        '<div class="card-content">' +
                            '<h3 class="card-title">' + item.title + '</h3>' +
                            '<div class="card-footer">' +
                                '<span>' + item.author + '</span>' +
                                '<span>🤍 ' + item.likes + '</span>' +
                            '</div>' +
                        '</div>' +
                    '</div>';
                elements.feedContainer.innerHTML += cardHtml;
            });
        }

        function getFilterName(filter) {
            var names = { 'all': '全部', 'ai': 'AI分类', 'custom': '自定义', 'pending': '待分类' };
            return names[filter] || '';
        }

        function attachTabListeners() {
            var mainTabs = elements.mainTabs.querySelectorAll('.tab');
            mainTabs.forEach(function(tab) {
                tab.addEventListener('click', function() {
                    var view = tab.getAttribute('data-view');
                    mainTabs.forEach(function(t) { t.classList.remove('active'); });
                    tab.classList.add('active');
                    switchView(view);
                });
            });

            var secondaryTabs = elements.secondaryTabs.querySelectorAll('.sub-tab');
            secondaryTabs.forEach(function(tab) {
                tab.addEventListener('click', function() {
                    var filter = tab.getAttribute('data-filter');
                    secondaryTabs.forEach(function(t) { t.classList.remove('active'); });
                    tab.classList.add('active');
                    renderCollections(filter);
                });
            });
        }

        function switchView(view) {
            if (view === 'all') {
                elements.feedContainer.style.display = 'grid';
                elements.collectionList.style.display = 'none';
                elements.secondaryTabs.style.display = 'none';
                elements.folderDetailView.style.display = 'none';
                renderFeed('all');
            } else if (view === 'favorites') {
                elements.feedContainer.style.display = 'none';
                elements.collectionList.style.display = 'flex';
                elements.secondaryTabs.style.display = 'flex';
                elements.folderDetailView.style.display = 'none';
                
                var secondaryTabs = elements.secondaryTabs.querySelectorAll('.sub-tab');
                secondaryTabs.forEach(function(t) { t.classList.remove('active'); });
                secondaryTabs[0].classList.add('active');
                renderCollections(secondaryTabs[0].getAttribute('data-filter'));
            }
        }

        function renderCollections(filter) {
            filter = filter || 'ai';
            elements.collectionList.innerHTML = '';
            var filteredFolders = [];

            if (filter === 'ai') { filteredFolders = collectionFolders.filter(function(folder) { return folder.title.indexOf('AI分类') !== -1; }); }
            else if (filter === 'custom') { filteredFolders = collectionFolders.filter(function(folder) { return folder.title.indexOf('自定义') !== -1; }); }
            else if (filter === 'pending') { filteredFolders = collectionFolders.filter(function(folder) { return folder.title === '待分类'; }); }
            else { filteredFolders = collectionFolders; }

            elements.emptyState.style.display = 'none';
            elements.collectionList.style.display = 'flex';
            
            if (filteredFolders.length === 0) {
                elements.collectionList.style.display = 'none';
                if (elements.emptyState.parentElement !== elements.collectionList.parentElement) {
                    elements.collectionList.parentElement.insertBefore(elements.emptyState, elements.collectionList);
                }
                elements.emptyState.style.display = 'block';
                elements.emptyStateMessage.textContent = '暂无' + getFilterName(filter) + '收藏夹';
                return;
            }

            filteredFolders.forEach(function(folder, index) {
                var thumbnailHtml = '';
                for (var i = 0; i < 4; i++) {
                    if (i < folder.images.length) {
                        thumbnailHtml += '<div class="folder-grid-item"><img src="' + folder.images[i] + '" alt="缩略图" class="folder-img"></div>';
                    } else {
                        thumbnailHtml += '<div class="folder-grid-item"><div class="folder-placeholder"></div></div>';
                    }
                }

                var displayTitle = folder.title.indexOf('自定义：') === 0 ? folder.title.substring(4) : folder.title;
                var folderHtml = 
                    '<div class="folder-item" data-id="folder-' + index + '" data-type="folder" data-title="' + folder.title + '">' +
                        '<div class="select-checkbox"></div>' +
                        '<div class="folder-header">' +
                            '<h3 class="folder-title">' + displayTitle + '</h3>' +
                            '<p class="folder-count">笔记 · ' + folder.count + '</p>' +
                        '</div>' +
                        '<div class="folder-grid">' +
                            thumbnailHtml +
                        '</div>' +
                    '</div>';
                elements.collectionList.innerHTML += folderHtml;
            });
        }

        // 核心修复：彻底废除 Promise，使用最传统的 Callback 回调写法，兼容任何老古董浏览器！
        function callRealAIClassificationAPI(pendingItems, onSuccess) {
            setTimeout(function() {
                var aiCategories = ['运动健身', '旅行攻略', '数码科技', '编程学习', '美食烹饪', '健康生活', '学习成长', '摄影艺术', '效率工具', '文学阅读'];
                var classifications = pendingItems.map(function(item) {
                    var randomCategory = aiCategories[Math.floor(Math.random() * aiCategories.length)];
                    return { id: item.id, category: 'AI分类：' + randomCategory, reason: '模拟' };
                });
                onSuccess(classifications);
            }, 1500);
        }

        function showStatusMessage(message, type) {
            type = type || 'info';
            elements.statusMessage.textContent = message;
            elements.statusMessage.className = 'status-message ' + type;
            elements.statusMessage.style.display = 'block';
            setTimeout(function() { elements.statusMessage.style.display = 'none'; }, 3000);
        }

        function setAIClassificationButtonState(isLoading, isSuccess) {
            isClassifying = isLoading;
            elements.aiSortBtn.disabled = isLoading;
            
            if (isLoading) {
                elements.aiBtnText.textContent = '正在呼叫AI...';
                elements.aiSpinner.style.display = 'block';
                elements.aiSortBtn.classList.add('btn-loading');
                elements.aiSortBtn.classList.remove('btn-ai', 'btn-success');
                elements.feedContainer.classList.add('loading');
            } else if (isSuccess) {
                elements.aiBtnText.textContent = '✨ 分类完成！';
                elements.aiSpinner.style.display = 'none';
                elements.aiSortBtn.classList.remove('btn-loading');
                elements.aiSortBtn.classList.add('btn-success');
                elements.feedContainer.classList.remove('loading');
                setTimeout(function() {
                    elements.aiBtnText.textContent = '✨ 一键智能分类';
                    elements.aiSortBtn.classList.remove('btn-success');
                    elements.aiSortBtn.classList.add('btn-ai');
                }, 3000);
            } else {
                elements.aiBtnText.textContent = '✨ 一键智能分类';
                elements.aiSpinner.style.display = 'none';
                elements.aiSortBtn.classList.remove('btn-loading', 'btn-success');
                elements.aiSortBtn.classList.add('btn-ai');
                elements.feedContainer.classList.remove('loading');
            }
        }

        function attachAIClassificationListener() {
            elements.aiSortBtn.addEventListener('click', function() {
                if (isClassifying) return;
                var pendingItems = collectionData.filter(function(item) { return !item.classified; });
                if (pendingItems.length === 0) {
                    showStatusMessage('🎉 所有内容都已经分类完成！', 'success');
                    return;
                }
                
                setAIClassificationButtonState(true);
                
                try {
                    // 使用传统的嵌套回调，彻底绝杀白屏问题
                    callRealAIClassificationAPI(pendingItems, function(classifications) {
                        classifications.forEach(function(classification) {
                            var index = -1;
                            for (var i=0; i<collectionData.length; i++) {
                                if (collectionData[i].id === classification.id) { index = i; break; }
                            }
                            if (index !== -1) {
                                collectionData[index].category = classification.category;
                                collectionData[index].classified = true;
                                collectionData[index].custom = false;
                            }
                        });
                        collectionFolders = generateCollectionFolders();
                        updateStats();
                        var activeTab = document.querySelector('.main-tabs .tab.active');
                        if (activeTab && activeTab.getAttribute('data-view') === 'all') { renderFeed('all'); }
                        if (activeTab && activeTab.getAttribute('data-view') === 'favorites') {
                            var subTab = document.querySelector('.secondary-tabs .sub-tab.active');
                            renderCollections(subTab ? subTab.getAttribute('data-filter') : 'ai');
                        }
                        showStatusMessage('✨ AI成功分类了 ' + classifications.length + ' 条内容！', 'success');
                        setAIClassificationButtonState(false, true);
                        
                        var remaining = collectionData.filter(function(item) { return !item.classified; }).length;
                        if (remaining === 0) {
                            var aiTab = document.querySelector('.secondary-tabs .sub-tab[data-filter="ai"]');
                            if (aiTab) { aiTab.click(); }
                        }
                    });
                } catch (error) {
                    showStatusMessage('😢 AI分类失败: ' + error.message, 'error');
                    setAIClassificationButtonState(false);
                }
            });
        }

        function enterBatchMode(mode) {
            batchMode = mode;
            if (mode !== 'permission') { permissionType = null; }
            document.body.classList.remove('mode-batch-permission', 'mode-batch-move', 'mode-batch-delete', 'mode-batch-custom', 'mode-batch-delete-folder');
            document.body.classList.add('mode-batch-' + mode);
            selectedItems = [];
            selectedFolders = [];
            updateBatchActionBar();
            elements.batchActionBar.classList.add('show');
            elements.selectionCounter.style.display = 'inline-block';
            updateSelectionCounter();
            elements.batchModal.style.display = 'none';
        }
        
        function exitBatchMode() {
            batchMode = null;
            permissionType = null;
            document.body.classList.remove('mode-batch-permission', 'mode-batch-move', 'mode-batch-delete', 'mode-batch-custom', 'mode-batch-delete-folder');
            selectedItems = [];
            selectedFolders = [];
            var selectedEls = document.querySelectorAll('.card.selected, .folder-item.selected');
            for (var i = 0; i < selectedEls.length; i++) { selectedEls[i].classList.remove('selected'); }
            elements.batchActionBar.classList.remove('show');
            elements.selectionCounter.style.display = 'none';
        }
        
        function updateSelectionCounter() {
            var selectedCount = document.querySelectorAll('.card.selected, .folder-item.selected').length;
            elements.selectionCounter.textContent = '已勾选 ' + selectedCount + ' 项';
        }
        
        function updateBatchActionBar() {
            if (batchMode === 'move') {
                elements.batchConfirmBtn.textContent = '移动';
                elements.batchConfirmBtn.className = 'batch-action-btn batch-action-confirm';
                elements.batchConfirmBtn.disabled = selectedItems.length === 0;
            } else if (batchMode === 'delete') {
                elements.batchConfirmBtn.textContent = '删除';
                elements.batchConfirmBtn.className = 'batch-action-btn batch-action-delete';
                elements.batchConfirmBtn.disabled = selectedItems.length === 0;
            } else if (batchMode === 'permission') {
                elements.batchConfirmBtn.textContent = '设置权限';
                elements.batchConfirmBtn.className = 'batch-action-btn batch-action-confirm';
                elements.batchConfirmBtn.disabled = selectedItems.length === 0;
            } else if (batchMode === 'custom') {
                elements.batchConfirmBtn.textContent = '创建集合';
                elements.batchConfirmBtn.className = 'batch-action-btn batch-action-create';
                elements.batchConfirmBtn.disabled = selectedItems.length === 0;
            } else if (batchMode === 'delete-folder') {
                elements.batchConfirmBtn.textContent = '解散收藏夹';
                elements.batchConfirmBtn.className = 'batch-action-btn batch-action-delete';
                elements.batchConfirmBtn.disabled = selectedFolders.length === 0;
            }
        }

        function attachBatchModalListeners() {
            elements.batchManageBtn.addEventListener('click', function() {
                elements.batchModal.style.display = 'block';
                showMenu('main');
            });

            function closeModal() { elements.batchModal.style.display = 'none'; }
            elements.modalOverlay.addEventListener('click', closeModal);
            elements.modalClose.addEventListener('click', closeModal);

            elements.optionPermission.addEventListener('click', function() { showMenu('permission'); });
            elements.optionMove.addEventListener('click', function() { enterBatchMode('move'); });
            elements.optionDeleteFolder.addEventListener('click', function() {
                elements.batchModal.style.display = 'none';
                var favoritesTab = document.querySelector('.main-tabs .tab[data-view="favorites"]');
                if (favoritesTab) { favoritesTab.click(); }
                setTimeout(function() { enterBatchMode('delete-folder'); }, 50);
            });
            elements.optionDelete.addEventListener('click', function() { enterBatchMode('delete'); });
            elements.backToMain.addEventListener('click', function() { showMenu('main'); });

            var permissionOptions = elements.permissionMenu.querySelectorAll('.modal-option');
            permissionOptions.forEach(function(option) {
                if (option !== elements.backToMain) {
                    option.addEventListener('click', function() {
                        permissionType = option.textContent;
                        enterBatchMode('permission');
                    });
                }
            });

            function showMenu(menuName) {
                elements.mainMenu.classList.remove('active');
                elements.permissionMenu.classList.remove('active');
                if (menuName === 'main') { elements.mainMenu.classList.add('active'); }
                else if (menuName === 'permission') { elements.permissionMenu.classList.add('active'); }
            }
        }

        function attachCardClickListeners() {
            elements.feedContainer.addEventListener('click', function(e) {
                var card = e.target.closest('.card[data-id]');
                if (!card) return;
                if (batchMode && batchMode !== 'delete-folder') {
                    e.preventDefault(); e.stopPropagation();
                    toggleItemSelection(card);
                }
            });

            elements.detailGrid.addEventListener('click', function(e) {
                var card = e.target.closest('.card[data-id]');
                if (!card) return;
                if (batchMode && batchMode !== 'delete-folder') {
                    e.preventDefault(); e.stopPropagation();
                    toggleItemSelection(card);
                }
            });

            elements.collectionList.addEventListener('click', function(e) {
                var folder = e.target.closest('.folder-item[data-id]');
                if (!folder) return;
                if (batchMode) {
                    e.preventDefault(); e.stopPropagation();
                    if (batchMode === 'move' || batchMode === 'delete-folder') { toggleFolderSelection(folder); }
                    return;
                }
                e.preventDefault(); e.stopPropagation();
                openFolderDetail(folder.getAttribute('data-title'));
            });
        }

        function toggleItemSelection(card) {
            var id = card.getAttribute('data-id');
            if (card.classList.contains('selected')) {
                card.classList.remove('selected');
                var index = selectedItems.indexOf(id);
                if (index > -1) { selectedItems.splice(index, 1); }
            } else {
                card.classList.add('selected');
                selectedItems.push(id);
            }
            updateBatchActionBar();
            updateSelectionCounter();
        }

        function toggleFolderSelection(folder) {
            var id = folder.getAttribute('data-id');
            if (folder.classList.contains('selected')) {
                folder.classList.remove('selected');
                var index = selectedFolders.indexOf(id);
                if (index > -1) { selectedFolders.splice(index, 1); }
            } else {
                folder.classList.add('selected');
                selectedFolders.push(id);
            }
            updateBatchActionBar();
            updateSelectionCounter();
        }

        function attachBatchActionListeners() {
            elements.batchCancelBtn.addEventListener('click', function() { exitBatchMode(); });
            elements.batchConfirmBtn.addEventListener('click', function() {
                if (batchMode === 'move') {
                    if (selectedItems.length === 0) return;
                    alert('成功移动 ' + selectedItems.length + ' 个项目' + (selectedFolders.length > 0 ? '到选中的收藏夹' : ''));
                    exitBatchMode();
                } else if (batchMode === 'delete') {
                    if (selectedItems.length === 0) return;
                    alert('成功删除 ' + selectedItems.length + ' 个项目');
                    exitBatchMode();
                } else if (batchMode === 'permission') {
                    if (selectedItems.length === 0) return;
                    var permissionText = permissionType ? '（' + permissionType + '）' : '';
                    alert('成功为 ' + selectedItems.length + ' 个项目设置权限' + permissionText);
                    exitBatchMode();
                } else if (batchMode === 'custom') {
                    if (selectedItems.length === 0) return;
                    var collectionName = prompt('请输入新的集合名称：');
                    if (collectionName && collectionName.trim()) {
                        var trimmedName = collectionName.trim();
                        selectedItems.forEach(function(itemId) {
                            var item = null;
                            for (var i=0; i<collectionData.length; i++) {
                                if (collectionData[i].id == itemId) { item = collectionData[i]; break; }
                            }
                            if (item) {
                                item.category = '自定义：' + trimmedName;
                                item.classified = true;
                                item.custom = true;
                            }
                        });
                        collectionFolders = generateCollectionFolders();
                        updateStats();
                        var currentActiveTab = document.querySelector('.main-tabs .tab.active');
                        if (currentActiveTab && currentActiveTab.getAttribute('data-view') === 'all') { renderFeed('all'); }
                        if (currentActiveTab && currentActiveTab.getAttribute('data-view') === 'favorites') {
                            var activeSubTab = document.querySelector('.secondary-tabs .sub-tab.active');
                            renderCollections(activeSubTab ? activeSubTab.getAttribute('data-filter') : 'ai');
                        }
                        alert('成功创建集合"' + trimmedName + '"，并添加了 ' + selectedItems.length + ' 个项目');
                        exitBatchMode();
                    }
                } else if (batchMode === 'delete-folder') {
                    if (selectedFolders.length === 0) return;
                    var folderTitles = [];
                    selectedFolders.forEach(function(folderId) {
                        var folderElement = document.querySelector('.folder-item[data-id="' + folderId + '"]');
                        if (folderElement) { folderTitles.push(folderElement.getAttribute('data-title')); }
                    });
                    if (folderTitles.length === 0) return;
                    
                    var resetCount = 0;
                    collectionData.forEach(function(item) {
                        if (folderTitles.indexOf(item.category) !== -1) {
                            item.category = '待分类';
                            item.classified = false;
                            item.custom = false;
                            resetCount++;
                        }
                    });
                    collectionFolders = generateCollectionFolders();
                    updateStats();
                    var activeTab = document.querySelector('.main-tabs .tab.active');
                    if (activeTab && activeTab.getAttribute('data-view') === 'all') { renderFeed('all'); }
                    if (activeTab && activeTab.getAttribute('data-view') === 'favorites') {
                        var subTab = document.querySelector('.secondary-tabs .sub-tab.active');
                        renderCollections(subTab ? subTab.getAttribute('data-filter') : 'ai');
                    }
                    alert('已成功解散收藏夹，内部 ' + resetCount + ' 个内容已安全移至待分类');
                    exitBatchMode();
                }
            });
        }

        function openFolderDetail(folderTitle) {
            elements.collectionList.style.display = 'none';
            elements.secondaryTabs.style.display = 'none';
            elements.folderDetailView.style.display = 'block';
            
            var displayTitle = folderTitle.indexOf('自定义：') === 0 ? folderTitle.substring(4) : folderTitle;
            elements.folderDetailView.querySelector('.detail-title').textContent = displayTitle;
            
            var filteredData = collectionData.filter(function(item) { return item.category === folderTitle; });
            renderDetailGrid(filteredData);
        }
        
        function closeFolderDetail() {
            elements.folderDetailView.style.display = 'none';
            var activeTab = document.querySelector('.main-tabs .tab.active');
            if (activeTab && activeTab.getAttribute('data-view') === 'favorites') {
                elements.secondaryTabs.style.display = 'flex';
                elements.collectionList.style.display = 'flex';
                var activeSubTab = document.querySelector('.secondary-tabs .sub-tab.active');
                renderCollections(activeSubTab ? activeSubTab.getAttribute('data-filter') : 'ai');
            }
        }
        
        function renderDetailGrid(data) {
            elements.detailGrid.innerHTML = '';
            elements.emptyState.style.display = 'none';
            elements.detailGrid.style.display = 'grid';
            
            if (data.length === 0) {
                elements.detailGrid.style.display = 'none';
                if (elements.emptyState.parentElement !== elements.folderDetailView) {
                    elements.folderDetailView.appendChild(elements.emptyState);
                }
                elements.emptyState.style.display = 'block';
                elements.emptyStateMessage.textContent = '该收藏夹暂无内容';
                return;
            }
            
            data.forEach(function(item) {
                var badgeHtml = '';
                var category = item.category;
                if (category.indexOf('自定义：') === 0) {
                    badgeHtml = '<div class="ai-badge" style="background: rgba(59, 130, 246, 0.8);">🏷️ ' + category + '</div>';
                } else if (category === '待分类') {
                    badgeHtml = '<div class="ai-badge" style="background: rgba(245, 158, 11, 0.8);">⏳ ' + category + '</div>';
                } else if (category.indexOf('AI分类：') === 0) {
                    badgeHtml = '<div class="ai-badge">✨ ' + category + '</div>';
                } else {
                    badgeHtml = '<div class="ai-badge">' + category + '</div>';
                }

                var cardHtml = 
                    '<div class="card" data-id="' + item.id + '" data-type="item">' +
                        '<div class="select-checkbox"></div>' +
                        badgeHtml +
                        '<img src="' + item.image + '" alt="封面" class="card-cover" loading="lazy">' +
                        '<div class="card-content">' +
                            '<h3 class="card-title">' + item.title + '</h3>' +
                            '<div class="card-footer">' +
                                '<span>' + item.author + '</span>' +
                                '<span>🤍 ' + item.likes + '</span>' +
                            '</div>' +
                        '</div>' +
                    '</div>';
                elements.detailGrid.innerHTML += cardHtml;
            });
        }

        function attachCustomCategoryListener() {
            elements.customCategoryBtn.addEventListener('click', function() {
                if (batchMode === 'custom' || document.body.classList.contains('mode-batch-custom')) {
                    exitBatchMode();
                } else {
                    enterBatchMode('custom');
                }
            });
        }

        if (document.readyState === 'loading') {
            document.addEventListener('DOMContentLoaded', initApp);
        } else {
            initApp();
        }
    </script>
</body>
</html>
